# =============================================================================
# CARGOBIT KUBERNETES DEPLOYMENT MANIFESTS
# Security-Config-Service & Platform Infrastructure
# =============================================================================
# Version: 1.0.0
# Letzte Aktualisierung: 2026-04-18
# =============================================================================

---
# =============================================================================
# 1. NAMESPACES
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: core
  labels:
    name: core
    type: core
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: domain
  labels:
    name: domain
    type: domain
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: data
  labels:
    name: data
    type: data
    istio-injection: enabled

---
# =============================================================================
# 2. NETWORK POLICIES
# =============================================================================

# -----------------------------------------------------------------------------
# Core Namespace Policies
# -----------------------------------------------------------------------------

# Security-Config-Service: Nur aus core und domain erreichbar
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: security-config-service-policy
  namespace: core
spec:
  podSelector:
    matchLabels:
      app: security-config-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Erlaube Traffic aus core namespace
    - from:
        - namespaceSelector:
            matchLabels:
              type: core
      ports:
        - protocol: TCP
          port: 3005
    # Erlaube Traffic aus domain namespace (Business-Services)
    - from:
        - namespaceSelector:
            matchLabels:
              type: domain
      ports:
        - protocol: TCP
          port: 3005
  egress:
    # Erlaube DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Erlaube Zugriff auf Config-Source (z.B. S3, Git)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 443

---
# API-Gateway: Einziger Entry-Point von außen
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-policy
  namespace: core
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Erlaube Traffic von Ingress Controller / Load Balancer
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
  egress:
    # Erlaube Zugriff auf alle Domain-Services
    - to:
        - namespaceSelector:
            matchLabels:
              type: domain
    # Erlaube Zugriff auf Core-Services
    - to:
        - namespaceSelector:
            matchLabels:
              type: core

---
# Auth-Service: Erreichbar von API-Gateway und Domain-Services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-service-policy
  namespace: core
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              type: core
        - namespaceSelector:
            matchLabels:
              type: domain
      ports:
        - protocol: TCP
          port: 3001
  egress:
    # Erlaube Zugriff auf DB in data namespace
    - to:
        - namespaceSelector:
            matchLabels:
              type: data
      ports:
        - protocol: TCP
          port: 5432
    # Erlaube DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

---
# -----------------------------------------------------------------------------
# Domain Namespace Policies
# -----------------------------------------------------------------------------

# Default Policy: Domain-Services dürfen nur zu Core-Services und ihren DBs
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: domain-default-policy
  namespace: domain
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Erlaube DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Erlaube Zugriff auf Core-Services
    - to:
        - namespaceSelector:
            matchLabels:
              type: core
    # Erlaube Zugriff auf Data-Services (DBs, Kafka)
    - to:
        - namespaceSelector:
            matchLabels:
              type: data

---
# Pricing-Service: Spezifische Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pricing-service-policy
  namespace: domain
spec:
  podSelector:
    matchLabels:
      app: pricing-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Nur von API-Gateway
    - from:
        - namespaceSelector:
            matchLabels:
              type: core
          podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 3002
  egress:
    # Security-Config-Service (für Fraud-Config)
    - to:
        - namespaceSelector:
            matchLabels:
              type: core
          podSelector:
            matchLabels:
              app: security-config-service
    # Kafka/NATS in data namespace
    - to:
        - namespaceSelector:
            matchLabels:
              type: data
    # Pricing DB
    - to:
        - namespaceSelector:
            matchLabels:
              type: data
      ports:
        - protocol: TCP
          port: 5432

---
# Matching-Service: Spezifische Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: matching-service-policy
  namespace: domain
spec:
  podSelector:
    matchLabels:
      app: matching-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              type: core
      ports:
        - protocol: TCP
          port: 3003
  egress:
    # Security-Config-Service (für Fraud-Penalty)
    - to:
        - namespaceSelector:
            matchLabels:
              type: core
          podSelector:
            matchLabels:
              app: security-config-service
    # Carrier-Service (für Stats)
    - to:
        - namespaceSelector:
            matchLabels:
              type: domain
          podSelector:
            matchLabels:
              app: carrier-service
    # Kafka/NATS
    - to:
        - namespaceSelector:
            matchLabels:
              type: data

---
# -----------------------------------------------------------------------------
# Data Namespace Policies
# -----------------------------------------------------------------------------

# PostgreSQL: Nur von autorisierten Services erreichbar
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-policy
  namespace: data
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    # Nur von core und domain namespaces
    - from:
        - namespaceSelector:
            matchLabels:
              type: core
        - namespaceSelector:
            matchLabels:
              type: domain
      ports:
        - protocol: TCP
          port: 5432

---
# Kafka: Nur von autorisierten Services erreichbar
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-policy
  namespace: data
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              type: core
        - namespaceSelector:
            matchLabels:
              type: domain
      ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093

---
# =============================================================================
# 3. SECURITY-CONFIG-SERVICE DEPLOYMENT
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: security-config
  namespace: core
data:
  security-config.yaml: |
    # Siehe /config/security-config.yaml
    # Wird bei Bedarf gemounted oder via Git-Repo geladen
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-config-service
  namespace: core
  labels:
    app: security-config-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: security-config-service
  template:
    metadata:
      labels:
        app: security-config-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3005"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: security-config-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: security-config-service
          image: cargobit/security-config-service:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3005
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3005"
            - name: CONFIG_PATH
              value: "/config/security-config.yaml"
            - name: REQUIRE_SERVICE_TOKEN
              value: "true"
            - name: LOG_LEVEL
              value: "info"
          envFrom:
            - secretRef:
                name: security-config-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: config-volume
              mountPath: /config
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3005
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config-volume
          configMap:
            name: security-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: security-config-service
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: security-config-service
  namespace: core
  labels:
    app: security-config-service
spec:
  type: ClusterIP
  clusterIP: None  # Headless für direkte Pod-Adressierung
  ports:
    - port: 3005
      targetPort: 3005
      name: http
  selector:
    app: security-config-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: security-config-service
  namespace: core
automountServiceAccountToken: false
---
apiVersion: v1
kind: Secret
metadata:
  name: security-config-secrets
  namespace: core
type: Opaque
stringData:
  SERVICE_TOKEN: "srv_security_config_token_placeholder"

---
# =============================================================================
# 4. PRICING-SERVICE DEPLOYMENT
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing-service
  namespace: domain
  labels:
    app: pricing-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pricing-service
  template:
    metadata:
      labels:
        app: pricing-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
    spec:
      serviceAccountName: pricing-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: pricing-service
          image: cargobit/pricing-service:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3002"
            - name: SECURITY_CONFIG_URL
              value: "http://security-config-service.core.svc.cluster.local:3005"
            - name: KAFKA_BROKERS
              value: "kafka.data.svc.cluster.local:9092"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pricing-db-credentials
                  key: url
          envFrom:
            - secretRef:
                name: pricing-service-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pricing-service
  namespace: domain
spec:
  type: ClusterIP
  ports:
    - port: 3002
      targetPort: 3002
      name: http
  selector:
    app: pricing-service

---
# =============================================================================
