# Prometheus Alert Rules - CargoBit Payment Platform
# Task 4: Payout Reconciliation + Task 5: Reconciliation Reporting & Export
# Apply with: kubectl apply -f prometheus-alerts-task4-task5.yaml -n monitoring

groups:
# =============================================================================
# TASK 4: PAYOUT RECONCILIATION ALERTS
# =============================================================================
- name: reconciliation.rules
  rules:
  # CRITICAL: Reconciliation job failing
  - alert: ReconciliationJobFailing
    expr: increase(reconciliation_runs_total{result="failure"}[5m]) > 0
    for: 1m
    labels:
      severity: critical
      team: payments
      incident_priority: P1
    annotations:
      summary: "Reconciliation CronJob is failing"
      description: "The reconciliation CronJob has failed {{ $value }} time(s) in the last 5 minutes. Check worker logs and database connectivity."
      runbook_url: "https://wiki.cargobit.io/runbooks/reconciliation-failure"
      impact: "Payouts may not be properly reconciled"

  # WARNING: Reconciliation taking too long
  - alert: ReconciliationDurationHigh
    expr: histogram_quantile(0.95, sum(rate(reconciliation_duration_seconds_bucket[5m])) by (le)) > 120
    for: 5m
    labels:
      severity: warning
      team: payments
      incident_priority: P2
    annotations:
      summary: "Reconciliation duration is high"
      description: "p95 reconciliation duration exceeded 120s. Current: {{ $value | printf \"%.1f\" }}s. Consider optimizing queries or scaling."
      runbook_url: "https://wiki.cargobit.io/runbooks/reconciliation-performance"

  # WARNING: Many open payouts detected
  - alert: OpenPayoutsAccumulating
    expr: reconciliation_open_payouts_gauge > 100
    for: 15m
    labels:
      severity: warning
      team: payments
      incident_priority: P2
    annotations:
      summary: "Many open payouts detected by reconciliation"
      description: "{{ $value }} open payouts have been detected. This may indicate issues with payout processing or Stripe webhook delivery."
      runbook_url: "https://wiki.cargobit.io/runbooks/open-payouts-backlog"

  # INFO: No reconciliation runs recently
  - alert: ReconciliationNotRunning
    expr: increase(reconciliation_runs_total[1h]) == 0
    for: 30m
    labels:
      severity: info
      team: payments
      incident_priority: P3
    annotations:
      summary: "No reconciliation runs in the last hour"
      description: "The reconciliation CronJob has not executed in over 30 minutes. Check CronJob schedule and pod status."
      runbook_url: "https://wiki.cargobit.io/runbooks/cronjob-not-running"

# =============================================================================
# TASK 5: RECONCILIATION REPORTING & EXPORT ALERTS
# =============================================================================
- name: reconciliation-reports.rules
  rules:
  # CRITICAL: Export failures
  - alert: ReportExportFailures
    expr: increase(report_exports_failed_total[5m]) > 0
    for: 1m
    labels:
      severity: critical
      team: payments
      incident_priority: P1
    annotations:
      summary: "Report export failures detected"
      description: "{{ $value }} report export(s) failed in the last 5 minutes. Check worker logs and S3 connectivity."
      runbook_url: "https://wiki.cargobit.io/runbooks/report-export-failures"
      impact: "Users cannot download reconciliation reports"

  # WARNING: High export duration
  - alert: ReportExportDurationHigh
    expr: histogram_quantile(0.95, sum(rate(report_export_duration_seconds_bucket[5m])) by (le)) > 60
    for: 5m
    labels:
      severity: warning
      team: payments
      incident_priority: P2
    annotations:
      summary: "High report export duration p95"
      description: "p95 export duration exceeded 60s. Current: {{ $value | printf \"%.1f\" }}s. Consider scaling workers or optimizing queries."
      runbook_url: "https://wiki.cargobit.io/runbooks/report-export-performance"

  # WARNING: Many exports in progress
  - alert: ReportExportInProgressHigh
    expr: report_export_in_progress > 5
    for: 10m
    labels:
      severity: warning
      team: payments
      incident_priority: P2
    annotations:
      summary: "Many report exports in progress"
      description: "{{ $value }} exports have been in progress for over 10 minutes. Workers may be stuck or overloaded."
      runbook_url: "https://wiki.cargobit.io/runbooks/report-export-backlog"

  # WARNING: Export queue growing
  - alert: ReportExportQueueGrowing
    expr: increase(report_exports_queued_total[10m]) - increase(report_exports_completed_total[10m]) > 10
    for: 5m
    labels:
      severity: warning
      team: payments
      incident_priority: P2
    annotations:
      summary: "Report export queue is growing"
      description: "Export queue has grown by {{ $value }} jobs in the last 10 minutes. Workers may be falling behind."
      runbook_url: "https://wiki.cargobit.io/runbooks/report-export-backlog"

  # INFO: No exports completing
  - alert: NoReportExportsCompleted
    expr: increase(report_exports_completed_total[1h]) == 0 and report_export_in_progress > 0
    for: 15m
    labels:
      severity: info
      team: payments
      incident_priority: P3
    annotations:
      summary: "No report exports completed recently"
      description: "No exports have completed in the last hour despite {{ $value }} in progress. Workers may be stuck."
      runbook_url: "https://wiki.cargobit.io/runbooks/report-export-stuck"

# =============================================================================
# SLO-BASED ALERTS
# =============================================================================
- name: payments-slo.rules
  rules:
  # SLO: 99.5% success rate for exports
  - alert: ExportSLONearBreach
    expr: |
      (
        sum(increase(report_exports_completed_total[7d]))
        /
        (sum(increase(report_exports_completed_total[7d])) + sum(increase(report_exports_failed_total[7d])))
      ) < 0.995
    for: 1h
    labels:
      severity: warning
      team: payments
      incident_priority: P2
    annotations:
      summary: "Export SLO approaching breach"
      description: "Weekly export success rate is {{ $value | printf \"%.2f\" }}%, below the 99.5% SLO target."
      runbook_url: "https://wiki.cargobit.io/runbooks/slo-breach"

  # SLO: p95 latency < 60s
  - alert: ExportLatencySLONearBreach
    expr: |
      histogram_quantile(0.95, sum(rate(report_export_duration_seconds_bucket[1h])) by (le)) > 60
    for: 30m
    labels:
      severity: warning
      team: payments
      incident_priority: P2
    annotations:
      summary: "Export latency SLO approaching breach"
      description: "Hourly p95 export latency is {{ $value | printf \"%.1f\" }}s, exceeding the 60s SLO target."
      runbook_url: "https://wiki.cargobit.io/runbooks/slo-breach"

# =============================================================================
# INFRASTRUCTURE ALERTS
# =============================================================================
- name: payments-infra.rules
  rules:
  # WARNING: Worker pod restarts
  - alert: PaymentsWorkerRestarting
    expr: increase(kube_pod_container_status_restarts_total{container="report-worker"}[15m]) > 2
    for: 5m
    labels:
      severity: warning
      team: payments
    annotations:
      summary: "Payments report worker is restarting frequently"
      description: "The report-worker container has restarted {{ $value }} times in 15 minutes. Check OOMKills or crash loops."
      runbook_url: "https://wiki.cargobit.io/runbooks/worker-crash-loop"

  # WARNING: High memory usage
  - alert: PaymentsWorkerMemoryHigh
    expr: container_memory_working_set_bytes{container="report-worker"} / container_spec_memory_limit_bytes{container="report-worker"} > 0.9
    for: 10m
    labels:
      severity: warning
      team: payments
    annotations:
      summary: "Payments report worker memory usage high"
      description: "Memory usage is at {{ $value | humanizePercentage }}. Consider increasing memory limit."
      runbook_url: "https://wiki.cargobit.io/runbooks/worker-memory"

  # CRITICAL: Worker unavailable
  - alert: PaymentsWorkerUnavailable
    expr: kube_deployment_status_replicas_available{deployment="payments-report-worker"} == 0
    for: 5m
    labels:
      severity: critical
      team: payments
      incident_priority: P1
    annotations:
      summary: "Payments report worker is unavailable"
      description: "No replicas of payments-report-worker are available. Exports cannot be processed."
      runbook_url: "https://wiki.cargobit.io/runbooks/worker-unavailable"
