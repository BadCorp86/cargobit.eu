name: k6 Export Load Test

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      scenario:
        description: 'Test scenario'
        required: true
        default: 'create-only'
        type: choice
        options:
          - create-only
          - full-flow
          - concurrent
          - burst
          - mixed
      vus:
        description: 'Number of virtual users'
        required: true
        default: '10'
        type: string
      duration:
        description: 'Test duration (e.g., 2m, 5m)'
        required: true
        default: '2m'
        type: string
      ramp_up:
        description: 'Ramp-up duration (e.g., 30s, 1m)'
        required: false
        default: '30s'
        type: string
      p95_latency:
        description: 'P95 latency threshold (ms)'
        required: false
        default: '2000'
        type: string

jobs:
  load-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6@v1

      - name: Get environment URL
        id: env-url
        run: |
          if [ "${{ inputs.environment }}" = "staging" ]; then
            echo "url=https://api.staging.cargobit.io" >> $GITHUB_OUTPUT
          else
            echo "url=https://api.cargobit.io" >> $GITHUB_OUTPUT
          fi

      - name: Run k6 load test
        env:
          BASE_URL: ${{ steps.env-url.outputs.url }}
          ADMIN_JWT: ${{ secrets.STAGING_ADMIN_JWT }}
          SCENARIO: ${{ inputs.scenario }}
          VUS: ${{ inputs.vus }}
          DURATION: ${{ inputs.duration }}
          RAMP_UP: ${{ inputs.ramp_up }}
          P95_LATENCY: ${{ inputs.p95_latency }}
        run: |
          k6 run ops/load-tests/k6-export-load-param.js \
            --out json=load-test-results.json

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results-${{ inputs.scenario }}-${{ github.run_id }}
          path: load-test-results.json
          retention-days: 30

      - name: Generate summary report
        if: always()
        run: |
          echo "## k6 Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scenario | ${{ inputs.scenario }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Virtual Users | ${{ inputs.vus }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${{ inputs.duration }} |" >> $GITHUB_STEP_SUMMARY
          echo "| P95 Threshold | ${{ inputs.p95_latency }}ms |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- \`load-test-results.json\` - Full test results" >> $GITHUB_STEP_SUMMARY
