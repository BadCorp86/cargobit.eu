# =============================================================================
# Kubeseal CI Snippet (GitHub Actions)
# =============================================================================
# Zweck: Erzeugt ein sealedsecret.yaml aus GitHub Secrets und öffnet optional
# einen Pull Request mit dem Ergebnis.
#
# Erforderliche GitHub Secrets:
# - KUBESEAL_CERT: Öffentliches Zertifikat des Sealed-Secrets-Controllers (PEM)
# - STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, DATABASE_URL, etc.
# =============================================================================

name: Generate SealedSecret

on:
  workflow_dispatch:

jobs:
  seal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NAMESPACE: staging
      SECRET_NAME: payments-secrets
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare plain secret manifest
        run: |
          cat > secret.yaml <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${SECRET_NAME}
            namespace: ${NAMESPACE}
          stringData:
            STRIPE_SECRET_KEY: "${{ secrets.STRIPE_SECRET_KEY }}"
            STRIPE_WEBHOOK_SECRET: "${{ secrets.STRIPE_WEBHOOK_SECRET }}"
            DATABASE_URL: "${{ secrets.DATABASE_URL }}"
            REDIS_HOST: "${{ secrets.REDIS_HOST }}"
            REDIS_PORT: "${{ secrets.REDIS_PORT }}"
            DEFAULT_STRIPE_ACCOUNT_ID: "${{ secrets.DEFAULT_STRIPE_ACCOUNT_ID }}"
            HOSTNAME: "${{ secrets.HOSTNAME }}"
            ADMIN_JWT: "${{ secrets.ADMIN_JWT }}"
          EOF

      - name: Install kubeseal
        run: |
          KUBESEAL_VERSION=v0.20.0
          curl -L -o kubeseal.tar.gz https://github.com/bitnami-labs/sealed-secrets/releases/download/${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION}-linux-amd64.tar.gz
          tar -xzf kubeseal.tar.gz kubeseal
          chmod +x kubeseal
          sudo mv kubeseal /usr/local/bin/kubeseal

      - name: Create sealedsecret.yaml
        env:
          KUBESEAL_CERT: ${{ secrets.KUBESEAL_CERT }}
        run: |
          # KUBESEAL_CERT must contain the controller public cert (PEM)
          echo "$KUBESEAL_CERT" > controller-cert.pem
          kubeseal --format yaml --cert controller-cert.pem < secret.yaml > sealedsecret.yaml
          ls -l sealedsecret.yaml
          sed -n '1,200p' sealedsecret.yaml

      - name: Commit sealedsecret to branch and open PR
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(sealedsecret): update payments sealed secret"
          branch: sealedsecret/update-{{ github.run_id }}
          title: "Update SealedSecret: payments-secrets"
          body: "Automatisch erzeugtes SealedSecret (staging). Bitte prüfen und mergen."
          files: |
            k8s/sealedsecret-payments.yaml:sealedsecret.yaml

      - name: Upload artifact (sealedsecret)
        uses: actions/upload-artifact@v4
        with:
          name: sealedsecret
          path: sealedsecret.yaml

      - name: Cleanup plain secret
        run: rm -f secret.yaml controller-cert.pem

# =============================================================================
# WICHTIGE HINWEISE
# =============================================================================
#
# 1. KUBESEAL_CERT ist das öffentliche Zertifikat des Sealed-Secrets-Controllers.
#    Exportiere es aus dem Cluster:
#    kubeseal --controller-namespace kube-system --fetch-cert > controller-cert.pem
#
# 2. Speichere den Inhalt als GitHub Secret "KUBESEAL_CERT"
#
# 3. Alternativ: Wenn CI direkten Cluster-Zugriff hat, kann kubeseal direkt
#    gegen den Controller laufen (erfordert kubeconfig).
#
# 4. Alle Secrets (STRIPE_SECRET_KEY, etc.) müssen als GitHub Secrets angelegt werden.
#
# 5. Nach dem Merge des PR kann das SealedSecret im Cluster deployed werden:
#    kubectl apply -f k8s/sealedsecret-payments.yaml -n staging
