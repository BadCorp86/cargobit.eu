# =============================================================================
# GitHub Actions Secret Rotation Workflow
# =============================================================================
# Rotiert automatisch Secrets in regelmäßigen Abständen:
# - Stripe API Keys
# - Admin JWT
# - Service Account Tokens
# =============================================================================

name: Rotate Secrets

on:
  schedule:
    # Jeden 1. des Monats um 02:00 UTC
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      secret-type:
        description: 'Which secret to rotate'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - stripe-keys
          - admin-jwt
          - service-account-token

jobs:
  rotate-stripe-keys:
    if: github.event.inputs.secret-type == 'all' || github.event.inputs.secret-type == 'stripe-keys' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rotate Stripe API Key
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          echo "Rotating Stripe API Key..."
          
          # Neuen Key über Stripe API erstellen
          NEW_KEY=$(curl -s https://api.stripe.com/v1/api_keys \
            -u "$STRIPE_SECRET_KEY:" \
            -d name="CI/CD Key - $(date +%Y-%m-%d)" \
            -d type="secret" | jq -r '.secret')
          
          if [ -z "$NEW_KEY" ] || [ "$NEW_KEY" = "null" ]; then
            echo "ERROR: Failed to create new Stripe key"
            exit 1
          fi
          
          echo "new_stripe_key=$NEW_KEY" >> $GITHUB_OUTPUT
          echo "✓ Neuer Stripe Key erstellt"

      - name: Update GitHub Secret
        uses: hmanzur/actions-set-secret@v2.0.0
        with:
          name: 'STRIPE_SECRET_KEY'
          value: ${{ steps.rotate.outputs.new_stripe_key }}
          repository: ${{ github.repository }}
          token: ${{ secrets.ADMIN_TOKEN }}

      - name: Notify team
        uses: slackapi/slack-github-action@v1.24.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: |
            🔐 Secret Rotation: Stripe API Key rotiert
            Repository: ${{ github.repository }}
            Zeit: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  rotate-admin-jwt:
    if: github.event.inputs.secret-type == 'all' || github.event.inputs.secret-type == 'admin-jwt' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Generate new Admin JWT
        id: generate
        run: |
          # JWT mit Node.js generieren
          npm install -g jsonwebtoken-cli
          
          # Neue JWT ID
          JWT_ID=$(uuidgen | tr '[:upper:]' '[:lower:]')
          
          # JWT erstellen (läuft in 90 Tagen ab)
          NEW_JWT=$(jwt sign --algorithm HS256 \
            --issuer "cargobit-ci" \
            --subject "admin-rotation" \
            --audience "cargobit-api" \
            --expires-in "90d" \
            --key "${{ secrets.JWT_SECRET }}" \
            "{\"jti\": \"$JWT_ID\", \"role\": \"ADMIN\", \"userId\": \"ci-rotation\"}")
          
          echo "new_jwt=$NEW_JWT" >> $GITHUB_OUTPUT
          echo "✓ Neuer Admin JWT erstellt (JTI: $JWT_ID)"

      - name: Update GitHub Secret
        uses: hmanzur/actions-set-secret@v2.0.0
        with:
          name: 'ADMIN_JWT'
          value: ${{ steps.generate.outputs.new_jwt }}
          repository: ${{ github.repository }}
          token: ${{ secrets.ADMIN_TOKEN }}

  rotate-k8s-token:
    if: github.event.inputs.secret-type == 'all' || github.event.inputs.secret-type == 'service-account-token' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Decode kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          echo "$KUBE_CONFIG_DATA" | base64 --decode > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      - name: Rotate Service Account Token
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          
          # Altes Token finden und löschen (optional)
          kubectl get secret -n staging | grep ci-deployer-token || true
          
          # Neues Token erstellen (90 Tage gültig)
          NEW_TOKEN=$(kubectl create token ci-deployer -n staging --duration=2160h)
          
          echo "new_token=$NEW_TOKEN" >> $GITHUB_OUTPUT
          echo "✓ Neues K8s Service Account Token erstellt"

      - name: Rebuild kubeconfig with new token
        id: rebuild
        env:
          NEW_TOKEN: ${{ steps.rotate.outputs.new_token }}
        run: |
          # Neue kubeconfig mit neuem Token erstellen
          cat > new-kubeconfig.yaml <<EOF
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              certificate-authority-data: $(kubectl config view --raw -o jsonpath='{.clusters[0].cluster.certificate-authority-data}')
              server: $(kubectl config view --raw -o jsonpath='{.clusters[0].cluster.server}')
            name: production-cluster
          contexts:
          - context:
              cluster: production-cluster
              namespace: staging
              user: ci-deployer
            name: ci-deployer@staging
          current-context: ci-deployer@staging
          users:
          - name: ci-deployer
            user:
              token: $NEW_TOKEN
          EOF
          
          # Base64 kodieren
          KUBE_CONFIG_B64=$(cat new-kubeconfig.yaml | base64 -w 0)
          echo "kubeconfig_b64=$KUBE_CONFIG_B64" >> $GITHUB_OUTPUT

      - name: Update GitHub Secret
        uses: hmanzur/actions-set-secret@v2.0.0
        with:
          name: 'KUBE_CONFIG_DATA'
          value: ${{ steps.rebuild.outputs.kubeconfig_b64 }}
          repository: ${{ github.repository }}
          token: ${{ secrets.ADMIN_TOKEN }}

  notify-rotation-complete:
    needs: [rotate-stripe-keys, rotate-admin-jwt, rotate-k8s-token]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Secret Rotation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Stripe API Key | ${{ needs.rotate-stripe-keys.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin JWT | ${{ needs.rotate-admin-jwt.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| K8s SA Token | ${{ needs.rotate-k8s-token.result }} |" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# Erforderliche GitHub Secrets
# =============================================================================
#
# ADMIN_TOKEN     - GitHub PAT mit repo Permissions (zum Setzen von Secrets)
# JWT_SECRET      - Secret für JWT-Signierung
# SLACK_BOT_TOKEN - Slack Bot Token für Benachrichtigungen
# SLACK_CHANNEL_ID - Slack Channel ID für Benachrichtigungen
#
# =============================================================================
# Hinweise
# =============================================================================
#
# 1. Stripe Key Rotation:
#    - Erstellt neuen Key via Stripe API
#    - Alte Keys müssen manuell in Stripe Dashboard deaktiviert werden
#
# 2. JWT Rotation:
#    - Verwendet JWT_SECRET zum Signieren
#    - Alte JWTs bleiben gültig bis Ablauf (require Blacklist-Implementierung)
#
# 3. K8s Token Rotation:
#    - Erstellt neues Token mit 90 Tagen Laufzeit
#    - Alte Tokens bleiben gültig bis Ablauf
#
# 4. ADMIN_TOKEN:
#    - Benötigt 'repo' Scope für Secrets-Zugriff
#    - Selbst rotieren: Persönlich > Developer Settings > PAT
