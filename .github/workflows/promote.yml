# =============================================================================
# CargoBit ML Pipeline - Promotion Workflow
# =============================================================================
# Triggers: Manual
# Steps: Evaluate metrics, Promote canary to active, Disable canary traffic
# =============================================================================

name: Promote Canary Model

on:
  workflow_dispatch:
    inputs:
      model_version:
        description: 'Model version to promote (empty = auto-detect)'
        required: false
        default: ''
      force:
        description: 'Force promotion without metric check'
        required: false
        default: 'false'
        type: boolean

env:
  KUBE_NAMESPACE: ml-serving
  DB_CONNECTION: ${{ secrets.ML_REGISTRY_DB }}

jobs:
  # ===========================================================================
  # EVALUATE JOB
  # ===========================================================================
  evaluate:
    runs-on: ubuntu-latest
    outputs:
      should_promote: ${{ steps.evaluate.outputs.should_promote }}
      candidate_version: ${{ steps.evaluate.outputs.candidate_version }}
      active_version: ${{ steps.evaluate.outputs.active_version }}
      metrics: ${{ steps.evaluate.outputs.metrics }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: pip install psycopg2-binary requests
      
      - name: Evaluate canary metrics
        id: evaluate
        env:
          DB_CONNECTION: ${{ secrets.ML_REGISTRY_DB }}
        run: |
          python ml-pipeline/scripts/evaluate_canary.py \
            --output evaluation.json \
            --metrics metrics.json
          
          SHOULD_PROMOTE=$(cat evaluation.json | jq -r '.should_promote')
          CANDIDATE=$(cat evaluation.json | jq -r '.candidate_version')
          ACTIVE=$(cat evaluation.json | jq -r '.active_version')
          
          echo "should_promote=$SHOULD_PROMOTE" >> $GITHUB_OUTPUT
          echo "candidate_version=$CANDIDATE" >> $GITHUB_OUTPUT
          echo "active_version=$ACTIVE" >> $GITHUB_OUTPUT
          echo "metrics=$(cat metrics.json | jq -c '.')" >> $GITHUB_OUTPUT
          
          echo "## Evaluation Results" >> $GITHUB_STEP_SUMMARY
          cat evaluation.json | jq '.' >> $GITHUB_STEP_SUMMARY
      
      - name: Check promotion criteria
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "⚠️ Force promotion enabled - skipping metric checks"
            echo "force=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.evaluate.outputs.should_promote }}" = "true" ]; then
            echo "✅ Metrics meet promotion criteria"
          else
            echo "❌ Metrics do not meet promotion criteria"
            echo "Use 'force' option to promote anyway"
            exit 1
          fi

  # ===========================================================================
  # PROMOTE JOB
  # ===========================================================================
  promote:
    needs: evaluate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: pip install psycopg2-binary
      
      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
      
      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
      
      - name: Promote model in registry
        env:
          DB_CONNECTION: ${{ secrets.ML_REGISTRY_DB }}
        run: |
          VERSION=${{ needs.evaluate.outputs.candidate_version }}
          
          python ml-pipeline/scripts/promote_model.py \
            --version $VERSION \
            --from-status CANDIDATE \
            --to-status ACTIVE
          
          echo "Promoted model $VERSION to ACTIVE"
      
      - name: Disable canary traffic
        run: |
          # Set canary share to 0
          kubectl patch configmap ml-inference-config \
            --namespace ${{ env.KUBE_NAMESPACE }} \
            --type merge \
            -p '{"data":{"canary_share":"0","canary_version":""}}'
          
          echo "Canary traffic disabled"
      
      - name: Invalidate model cache
        run: |
          # Trigger cache invalidation
          kubectl exec -n ${{ env.KUBE_NAMESPACE }} deployment/ml-inference -- \
            curl -X POST http://localhost:8000/model/invalidate-cache || true
          
          # Reload model
          kubectl exec -n ${{ env.KUBE_NAMESPACE }} deployment/ml-inference -- \
            curl -X POST http://localhost:8000/model/reload || true
      
      - name: Verify promotion
        run: |
          # Check that active model is correct
          ACTIVE_VERSION=$(kubectl exec -n ${{ env.KUBE_NAMESPACE }} deployment/ml-inference -- \
            curl -s http://localhost:8000/model/info | jq -r '.version')
          
          echo "Active model version: $ACTIVE_VERSION"
          
          if [ "$ACTIVE_VERSION" != "${{ needs.evaluate.outputs.candidate_version }}" ]; then
            echo "⚠️ Warning: Active version mismatch"
          else
            echo "✅ Promotion verified"
          fi
      
      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "promoted-${{ needs.evaluate.outputs.candidate_version }}" -m "Promoted model ${{ needs.evaluate.outputs.candidate_version }} to ACTIVE"
          git push origin "promoted-${{ needs.evaluate.outputs.candidate_version }}" || true

  # ===========================================================================
  # CLEANUP JOB
  # ===========================================================================
  cleanup:
    needs: [evaluate, promote]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: pip install psycopg2-binary
      
      - name: Cleanup old models
        env:
          DB_CONNECTION: ${{ secrets.ML_REGISTRY_DB }}
        run: |
          python ml-pipeline/scripts/cleanup_models.py \
            --keep 5 \
            --status ROLLED_BACK DEPRECATED

  # ===========================================================================
  # NOTIFICATION JOB
  # ===========================================================================
  notify:
    needs: [evaluate, promote]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ ML Model Promoted to Active"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Previous Active:*\n`${{ needs.evaluate.outputs.active_version }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*New Active:*\n`${{ needs.evaluate.outputs.candidate_version }}`"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Metrics:*\n```json\n${{ needs.evaluate.outputs.metrics }}\n```"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
