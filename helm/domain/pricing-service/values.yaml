# =============================================================================
# Pricing-Service Helm Values
# =============================================================================

# Image configuration
image:
  repository: cargobit/pricing-service
  tag: "2.0.0"
  pullPolicy: IfNotPresent

# Replica configuration
replicaCount: 3

# Service account
serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 3002

# Resource limits
resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: pricing-service
          topologyKey: kubernetes.io/hostname

# =============================================================================
# ENVIRONMENT CONFIGURATION
# =============================================================================

env:
  NODE_ENV: "production"
  PORT: "3002"
  LOG_LEVEL: "info"
  SECURITY_CONFIG_URL: "http://security-config-service.core.svc.cluster.local:3005"
  KAFKA_BROKERS: "kafka.data.svc.cluster.local:9092"
  REDIS_URL: "redis.data.svc.cluster.local:6379"

# Database configuration
database:
  enabled: true
  host: "postgres.data.svc.cluster.local"
  port: 5432
  name: "pricing"
  existingSecret: "pricing-db-credentials"
  secretKeys:
    username: "username"
    password: "password"
    url: "url"

# =============================================================================
# SECURITY CONFIG CLIENT
# =============================================================================

securityConfigClient:
  enabled: true
  checkIntervalMs: 60000
  timeoutMs: 5000
  maxRetries: 3
  serviceToken:
    existingSecret: "pricing-service-token"
    key: "token"

# =============================================================================
# FRAUD SCORING CONFIGURATION
# =============================================================================

fraudScoring:
  enabled: true
  
  # Override config values (normally from Security-Config-Service)
  carrierScore:
    weights:
      cancelRate: 0.3
      disputeRate: 0.3
      noShowRate: 0.2
      patternScore: 0.2
    thresholds:
      observe: 0.3
      suspect: 0.6
  
  bidScore:
    weights:
      dumping: 0.5
      spam: 0.3
      coordination: 0.2
    dumping:
      maxDiscountVsMarket: 0.35
      hardFloorEur: 20
      minPriceFactor: 0.85
  
  totalScore:
    alphaCarrier: 0.6
    penaltyFactor: 0.5

# =============================================================================
# NETWORK POLICY
# =============================================================================

networkPolicy:
  enabled: true
  allowedNamespaces:
    - core  # API-Gateway, Security-Config-Service
    - domain  # Other domain services
  allowedServices:
    - security-config-service

# =============================================================================
# KAFKA CONFIGURATION
# =============================================================================

kafka:
  enabled: true
  topics:
    - name: pricing.calculated
    - name: bid.validated
    - name: fraud.suspected
  consumerGroups:
    - pricing-service

# =============================================================================
# MONITORING
# =============================================================================

serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics
  labels:
    release: prometheus

# =============================================================================
# LIVENESS & READINESS PROBES
# =============================================================================

livenessProbe:
  httpGet:
    path: /health
    port: 3002
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 3002
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# =============================================================================
# CONFIGMAP
# =============================================================================

configMap:
  enabled: true
  data: {}
