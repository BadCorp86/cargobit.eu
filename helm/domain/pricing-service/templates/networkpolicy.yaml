{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pricing-service.fullname" . }}
  labels:
    {{- include "pricing-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pricing-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only from API-Gateway in core namespace
    - from:
        - namespaceSelector:
            matchLabels:
              type: core
          podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 3002
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Allow to Security-Config-Service
    - to:
        - namespaceSelector:
            matchLabels:
              type: core
          podSelector:
            matchLabels:
              app.kubernetes.io/name: security-config-service
    # Allow to Kafka
    - to:
        - namespaceSelector:
            matchLabels:
              type: data
          podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
    # Allow to PostgreSQL
    - to:
        - namespaceSelector:
            matchLabels:
              type: data
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
{{- end }}
