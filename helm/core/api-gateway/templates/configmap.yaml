apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "api-gateway.fullname" . }}-config
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
data:
  rate-limits.yaml: |
    {{- toYaml .Values.rateLimits | nindent 4 }}
  
  routes.yaml: |
    {{- toYaml .Values.routes | nindent 4 }}
