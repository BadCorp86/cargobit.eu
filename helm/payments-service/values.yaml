replicaCount: 2

image:
  repository: registry.example.com/payments-backend
  tag: "latest"
  pullPolicy: IfNotPresent

workerImage:
  repository: registry.example.com/payments-worker
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  backend:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  worker:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

env:
  existingSecret: payments-secrets
  envFromSecretKeys:
    - STRIPE_SECRET_KEY
    - STRIPE_WEBHOOK_SECRET
    - DATABASE_URL
    - REDIS_HOST
    - REDIS_PORT
    - DEFAULT_STRIPE_ACCOUNT_ID
    - HOSTNAME
    - ADMIN_JWT

readinessProbe:
  path: /api/health
  port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10

livenessProbe:
  path: /api/health
  port: 3000
  initialDelaySeconds: 30
  periodSeconds: 30

worker:
  enabled: true
  replicas: 2
  command: ["node", "dist/src/main.worker.js"]

cron:
  enabled: true
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

rbac:
  create: true

serviceAccount:
  create: true
  name: payments-service-account

ingress:
  enabled: false

nodeSelector: {}
tolerations: []
affinity: {}
