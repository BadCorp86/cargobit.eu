apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: payments-secrets
  namespace: staging
spec:
  encryptedData:
    # Diese Werte sind Platzhalter. Erzeuge ein plain Secret lokal und seal es mit kubeseal.
    STRIPE_SECRET_KEY: REPLACE_WITH_SEALED_VALUE
    STRIPE_WEBHOOK_SECRET: REPLACE_WITH_SEALED_VALUE
    DATABASE_URL: REPLACE_WITH_SEALED_VALUE
    REDIS_HOST: REPLACE_WITH_SEALED_VALUE
    REDIS_PORT: REPLACE_WITH_SEALED_VALUE
    DEFAULT_STRIPE_ACCOUNT_ID: REPLACE_WITH_SEALED_VALUE
    HOSTNAME: REPLACE_WITH_SEALED_VALUE
    ADMIN_JWT: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      labels:
        app: payments

---
# ==============================================================================
# SealedSecrets Erstellung - Schritt für Schritt
# ==============================================================================
#
# 1. Erstelle ein temporäres plain Secret `secret.yaml` mit `stringData`:
#
#    cat > secret.yaml <<EOF
#    apiVersion: v1
#    kind: Secret
#    metadata:
#      name: payments-secrets-plain
#      namespace: staging
#    stringData:
#      STRIPE_SECRET_KEY: "sk_test_xxx"
#      STRIPE_WEBHOOK_SECRET: "whsec_xxx"
#      DATABASE_URL: "postgres://user:pass@db:5432/db"
#      REDIS_HOST: "redis-host"
#      REDIS_PORT: "6379"
#      DEFAULT_STRIPE_ACCOUNT_ID: "acct_xxx"
#      HOSTNAME: "payments-staging-01"
#      ADMIN_JWT: "eyJhbGciOi..."
#    EOF
#
# 2. Verwende `kubeseal` (lokal mit Controller-Zertifikat oder im Cluster):
#
#    kubeseal --controller-namespace kube-system --format yaml < secret.yaml > sealedsecret.yaml
#
# 3. Prüfe `sealedsecret.yaml` und deploye:
#
#    kubectl apply -f sealedsecret.yaml --namespace staging
#
# 4. Verifizierung:
#
#    kubectl get sealedsecret payments-secrets -n staging
#    kubectl get secret payments-secrets -n staging
#
# ==============================================================================
# Alternativen für Produktion
# ==============================================================================
#
# - External Secrets Operator (HashiCorp Vault, AWS Secrets Manager, Azure Key Vault)
# - SOPS (Mozilla SOPS mit Age/GPG)
# - Vault Injector (HashiCorp Vault Agent Injector)
#
