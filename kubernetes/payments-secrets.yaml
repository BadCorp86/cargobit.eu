apiVersion: v1
kind: Secret
metadata:
  name: payments-secrets
  namespace: staging
type: Opaque
stringData:
  # Stripe
  STRIPE_SECRET_KEY: "sk_test_xxx_replace"
  STRIPE_WEBHOOK_SECRET: "whsec_xxx_replace"

  # Database
  DATABASE_URL: "postgres://user:pass@db-host:5432/dbname"

  # Redis
  REDIS_HOST: "redis-host"
  REDIS_PORT: "6379"

  # App config
  DEFAULT_STRIPE_ACCOUNT_ID: "acct_xxx_replace"
  HOSTNAME: "payments-staging-01"

  # Admin JWT for tests (only in staging)
  ADMIN_JWT: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

---
# Production Notes:
# - stringData allows plaintext during kubectl apply; Kubernetes stores values Base64-encoded
# - Replace placeholders with secrets from your Secret Manager
# - Avoid committing secrets to Git
# - Use SealedSecrets, External Secrets Operator, or HashiCorp Vault for production
#
# Example with External Secrets Operator:
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: payments-secrets
#   namespace: production
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: vault-backend
#     kind: ClusterSecretStore
#   target:
#     name: payments-secrets
#     creationPolicy: Owner
#   data:
#     - secretKey: STRIPE_SECRET_KEY
#       remoteRef:
#         key: payments/stripe
#         property: secret_key
