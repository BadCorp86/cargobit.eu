apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: payments-secrets
  namespace: staging
spec:
  encryptedData:
    # Ersetze die Base64-werte durch die von kubeseal erzeugten Werte
    STRIPE_SECRET_KEY: AgB...SEALED...
    STRIPE_WEBHOOK_SECRET: AgC...SEALED...
    DATABASE_URL: AgD...SEALED...
    REDIS_HOST: AgE...SEALED...
    REDIS_PORT: AgF...SEALED...
    DEFAULT_STRIPE_ACCOUNT_ID: AgG...SEALED...
    HOSTNAME: AgH...SEALED...
    ADMIN_JWT: AgI...SEALED...
  template:
    metadata:
      labels:
        app: payments

---
# ==============================================================================
# SealedSecrets Workflow
# ==============================================================================
#
# 1. Erzeuge ein plain Secret lokal (yaml) mit stringData:
#    cat > secret.yaml <<EOF
#    apiVersion: v1
#    kind: Secret
#    metadata:
#      name: payments-secrets
#      namespace: staging
#    stringData:
#      STRIPE_SECRET_KEY: "sk_live_xxx"
#      ...
#    EOF
#
# 2. Verschlüssele mit kubeseal:
#    kubeseal --controller-namespace kube-system --format yaml < secret.yaml > sealedsecret.yaml
#
# 3. Prüfe kubeseal Zertifikat und Controller-Version im Cluster:
#    kubeseal --fetch-cert --controller-namespace kube-system
#
# 4. Apply:
#    kubectl apply -f sealedsecret.yaml --namespace staging
#
# 5. Verifizierung:
#    kubectl get sealedsecret payments-secrets -n staging
#    kubectl get secret payments-secrets -n staging
#
# ==============================================================================
# Sicherheits-Hinweise
# ==============================================================================
#
# - SealedSecrets können sicher in Git gespeichert werden
# - Nur der SealedSecrets Controller im Cluster kann sie entschlüsseln
# - Rotation: Bei Key-Rotation müssen alle SealedSecrets neu erstellt werden
# - Scope: Standardmäßig sealed-secrets scope=strict (namespace+name gebunden)
#
# Alternativen:
# - External Secrets Operator (HashiCorp Vault, AWS Secrets Manager, Azure Key Vault)
# - SOPS (Mozilla SOPS mit Age/GPG)
# - Vault Injector (HashiCorp Vault Agent Injector)
