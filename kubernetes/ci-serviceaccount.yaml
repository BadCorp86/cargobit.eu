# =============================================================================
# CI ServiceAccount für namespace-scoped Deployments
# =============================================================================
# Erstellt einen ServiceAccount mit minimalen Rechten für CI/CD Deployments.
# Der ServiceAccount kann nur im angegebenen Namespace (staging) arbeiten.
# =============================================================================

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-deployer
  namespace: staging
  labels:
    app: payments
    role: ci-deployer
automountServiceAccountToken: true

---
# =============================================================================
# Role: Namespace-scoped Berechtigungen für CI
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-deployer-role
  namespace: staging
  labels:
    app: payments
rules:
  # Deployments: Erstellen, Lesen, Aktualisieren, Löschen
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # ReplicaSets und Pods: Lesen für Debugging
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  # Services: Erstellen und Verwalten
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # ConfigMaps und Secrets: Lesen (Referenz für Deployments)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]  # Kein create/update für Secrets über CI!

  # Ingress: Erstellen und Verwalten
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # CronJobs: Erstellen und Verwalten
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # HorizontalPodAutoscaler
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # PodDisruptionBudget
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Events: Lesen für Debugging
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

  # SealedSecrets: Anwenden (falls verwendet)
  - apiGroups: ["bitnami.com"]
    resources: ["sealedsecrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  # ServiceAccounts: Lesen
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list"]

  # Rollouts Restart (kubectl rollout restart)
  - apiGroups: ["apps"]
    resources: ["deployments/restart"]
    verbs: ["create"]

---
# =============================================================================
# RoleBinding: Bindet ServiceAccount an Role
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-deployer-binding
  namespace: staging
  labels:
    app: payments
subjects:
  - kind: ServiceAccount
    name: ci-deployer
    namespace: staging
roleRef:
  kind: Role
  name: ci-deployer-role
  apiGroup: rbac.authorization.k8s.io

---
# =============================================================================
# Anleitung: Kubeconfig für CI erstellen
# =============================================================================
# 1. ServiceAccount anlegen:
#    kubectl apply -f ci-serviceaccount.yaml -n staging
#
# 2. Secret-Token extrahieren (Kubernetes < 1.24):
#    kubectl get secret -n staging | grep ci-deployer-token
#    kubectl get secret ci-deployer-token-xxxxx -n staging -o jsonpath='{.data.token}' | base64 -d
#
# 3. Für Kubernetes 1.24+: Token manuell erstellen:
#    kubectl create token ci-deployer -n staging --duration=87600h > token.txt
#
# 4. Kubeconfig für CI erstellen:
#    cat > ci-kubeconfig.yaml <<EOF
#    apiVersion: v1
#    kind: Config
#    clusters:
#    - cluster:
#        certificate-authority-data: $(kubectl config view --raw -o jsonpath='{.clusters[0].cluster.certificate-authority-data}')
#        server: $(kubectl config view --raw -o jsonpath='{.clusters[0].cluster.server}')
#      name: production-cluster
#    contexts:
#    - context:
#        cluster: production-cluster
#        namespace: staging
#        user: ci-deployer
#      name: ci-deployer@staging
#    current-context: ci-deployer@staging
#    users:
#    - name: ci-deployer
#      user:
#        token: <TOKEN_AUS_SCHRITT_3>
#    EOF
#
# 5. Als GitHub Secret speichern:
#    cat ci-kubeconfig.yaml | base64 -w 0 > kubeconfig_base64.txt
#    # Inhalt als KUBE_CONFIG_DATA Secret in GitHub anlegen
#
# =============================================================================
# Sicherheitshinweise
# =============================================================================
# - Token hat lange Laufzeit (87600h = 10 Jahre); rotiere regelmäßig!
# - ServiceAccount ist namespace-scoped (staging)
# - Keine Secrets-Erstellung über CI (nur Lesen)
# - Für Production: Separaten ServiceAccount mit zusätzlichen Reviews
# =============================================================================
