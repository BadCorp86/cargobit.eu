# ================================================================================
# CARGOBIT CODE-GENERATOR SYSTEM - PIPELINE CONFIGURATION
# ================================================================================
# Version: 1.0.0
# Description: CI/CD Pipeline Definition für automatisierte Code-Generierung
# ================================================================================

pipeline:
  name: "cargobit-code-generator"
  version: "1.0.0"
  description: "Automatisierte Pipeline für Code-Generierung und Validierung"
  
  triggers:
    - type: "manual"
      enabled: true
    - type: "webhook"
      enabled: true
      endpoint: "/api/generate"
    - type: "schedule"
      enabled: false
      cron: "0 2 * * *"

# ================================================================================
# PIPELINE STAGES
# ================================================================================

stages:
  # ----------------------------------------------------------------------------
  # STAGE 1: INITIALIZATION
  # ----------------------------------------------------------------------------
  - id: "init"
    name: "Initialization"
    description: "Pipeline-Initialisierung und Environment-Setup"
    
    steps:
      - id: "init-1"
        name: "Validate Configuration"
        type: "validation"
        command: "node scripts/validate-config.js"
        timeout_ms: 30000
        
      - id: "init-2"
        name: "Setup Environment"
        type: "setup"
        commands:
          - "mkdir -p output/cargobit-payment-system"
          - "cp -r scaffold/* output/cargobit-payment-system/"
        timeout_ms: 10000
        
      - id: "init-3"
        name: "Install Dependencies"
        type: "setup"
        command: "npm install"
        timeout_ms: 120000
        
    on_failure: "abort"

  # ----------------------------------------------------------------------------
  # STAGE 2: GENERATION
  # ----------------------------------------------------------------------------
  - id: "generate"
    name: "Code Generation"
    description: "Multi-Agent Code-Generierung"
    
    steps:
      - id: "gen-1"
        name: "Start Multi-Agent System"
        type: "execution"
        command: "node orchestrator/index.js"
        timeout_ms: 600000
        
        inputs:
          - "config/multi-agent-config.yaml"
          - "config/config.yaml"
          
        outputs:
          - "output/cargobit-payment-system/**/*"
          
        env:
          NODE_ENV: "production"
          LOG_LEVEL: "info"
          
    on_failure: "retry"
    retry_count: 3

  # ----------------------------------------------------------------------------
  # STAGE 3: VALIDATION
  # ----------------------------------------------------------------------------
  - id: "validate"
    name: "Validation"
    description: "Validierung der generierten Artefakte"
    
    steps:
      - id: "val-1"
        name: "Check Output Structure"
        type: "validation"
        command: "node scripts/check-structure.js"
        timeout_ms: 30000
        
      - id: "val-2"
        name: "TypeScript Syntax Check"
        type: "validation"
        command: "npx tsc --noEmit"
        cwd: "output/cargobit-payment-system"
        timeout_ms: 60000
        
      - id: "val-3"
        name: "Prisma Schema Validation"
        type: "validation"
        command: "npx prisma validate"
        cwd: "output/cargobit-payment-system"
        timeout_ms: 30000
        
      - id: "val-4"
        name: "ESLint Check"
        type: "validation"
        command: "npx eslint . --ext .ts"
        cwd: "output/cargobit-payment-system"
        timeout_ms: 60000
        
      - id: "val-5"
        name: "Shell Script Validation"
        type: "validation"
        command: "shellcheck ops/*.sh"
        cwd: "output/cargobit-payment-system"
        timeout_ms: 30000
        continue_on_error: true
        
    on_failure: "abort"

  # ----------------------------------------------------------------------------
  # STAGE 4: TESTING
  # ----------------------------------------------------------------------------
  - id: "test"
    name: "Testing"
    description: "Ausführung aller Tests"
    
    steps:
      - id: "test-1"
        name: "Run Unit Tests"
        type: "test"
        command: "npm test -- --coverage"
        cwd: "output/cargobit-payment-system"
        timeout_ms: 300000
        
      - id: "test-2"
        name: "Check Coverage Threshold"
        type: "validation"
        command: "node scripts/check-coverage.js"
        timeout_ms: 30000
        
    on_failure: "abort"
    coverage_threshold: 80

  # ----------------------------------------------------------------------------
  # STAGE 5: ASSEMBLY
  # ----------------------------------------------------------------------------
  - id: "assemble"
    name: "Assembly"
    description: "Zusammenstellung der finalen Artefakte"
    
    steps:
      - id: "asm-1"
        name: "Generate Manifest"
        type: "execution"
        command: "node scripts/generate-manifest.js"
        timeout_ms: 30000
        
      - id: "asm-2"
        name: "Create Archive"
        type: "execution"
        command: "tar -czf cargobit-payment-system.tar.gz -C output cargobit-payment-system"
        timeout_ms: 60000
        
      - id: "asm-3"
        name: "Calculate Checksums"
        type: "execution"
        command: "sha256sum cargobit-payment-system.tar.gz > cargobit-payment-system.tar.gz.sha256"
        timeout_ms: 30000
        
    on_failure: "retry"

  # ----------------------------------------------------------------------------
  # STAGE 6: PUBLISH
  # ----------------------------------------------------------------------------
  - id: "publish"
    name: "Publish"
    description: "Veröffentlichung der Artefakte"
    
    steps:
      - id: "pub-1"
        name: "Git Commit"
        type: "publish"
        commands:
          - "git add output/"
          - "git commit -m 'chore: generated code artifacts'"
        timeout_ms: 30000
        continue_on_error: true
        
      - id: "pub-2"
        name: "Create Release Tag"
        type: "publish"
        command: "git tag -a v$(date +%Y%m%d%H%M%S) -m 'Generated code release'"
        timeout_ms: 30000
        continue_on_error: true
        
      - id: "pub-3"
        name: "Upload Artifacts"
        type: "publish"
        command: "echo 'Uploading artifacts to storage...'"
        timeout_ms: 60000
        
    on_failure: "continue"

# ================================================================================
# OUTPUT SPECIFICATION
# ================================================================================

output:
  directory: "./output/cargobit-payment-system"
  
  required_files:
    # Prisma
    - path: "prisma/schema.prisma"
      required: true
      
    # Migrations
    - path: "migrations/0001_init.sql"
      required: true
    - path: "migrations/0002_indexes.sql"
      required: true
      
    # Library
    - path: "src/lib/prisma.ts"
      required: true
    - path: "src/lib/redis.ts"
      required: true
    - path: "src/lib/rateLimit.ts"
      required: true
      
    # Middleware
    - path: "src/middleware/rateLimit.ts"
      required: true
      
    # Webhooks
    - path: "src/webhooks/stripe.ts"
      required: true
      
    # Services
    - path: "src/services/stripeEvents.ts"
      required: true
    - path: "src/services/auditLog.ts"
      required: true
      
    # Jobs
    - path: "src/jobs/auditVerify.ts"
      required: true
      
    # Operations
    - path: "ops/backup-db.sh"
      required: true
    - path: "ops/restore-db.sh"
      required: true
    - path: "ops/cron-backup.yaml"
      required: true
      
    # Tests
    - path: "tests/unit/rateLimit.test.ts"
      required: true
    - path: "tests/unit/stripeWebhook.test.ts"
      required: true
    - path: "tests/unit/auditLog.test.ts"
      required: true
      
    # Documentation
    - path: "docs/policies/security-policy.md"
      required: true
    - path: "docs/playbooks/incident-payment-outage.md"
      required: true
    - path: "docs/operational-readiness-checklist.md"
      required: true
      
    # Manifest
    - path: "manifest.json"
      required: true

  optional_files:
    - path: "src/lib/logger.ts"
    - path: "src/lib/config.ts"
    - path: "tests/fixtures/stripeEvents.json"
    - path: "docs/compliance/slas.md"

# ================================================================================
# NOTIFICATION CONFIGURATION
# ================================================================================

notifications:
  enabled: true
  
  channels:
    - type: "slack"
      webhook_url: "${SLACK_WEBHOOK_URL}"
      events:
        - "pipeline_start"
        - "pipeline_complete"
        - "pipeline_failed"
        - "stage_failed"
        
    - type: "email"
      recipients:
        - "${NOTIFICATION_EMAIL}"
      events:
        - "pipeline_complete"
        - "pipeline_failed"
        
  templates:
    pipeline_start: |
      🚀 CargoBit Code Generator Pipeline Started
      Run ID: {{run_id}}
      Triggered by: {{trigger}}
      
    pipeline_complete: |
      ✅ CargoBit Code Generator Pipeline Complete
      Run ID: {{run_id}}
      Duration: {{duration}}
      Files generated: {{file_count}}
      
    pipeline_failed: |
      ❌ CargoBit Code Generator Pipeline Failed
      Run ID: {{run_id}}
      Failed at: {{failed_stage}}
      Error: {{error_message}}

# ================================================================================
# ARTIFACT CONFIGURATION
# ================================================================================

artifacts:
  - name: "source-code"
    type: "archive"
    format: "tar.gz"
    include:
      - "output/cargobit-payment-system/**/*"
    exclude:
      - "node_modules"
      - "*.log"
      - ".git"
    retention_days: 30
    
  - name: "manifest"
    type: "file"
    path: "output/cargobit-payment-system/manifest.json"
    retention_days: 90
    
  - name: "test-coverage"
    type: "report"
    path: "output/cargobit-payment-system/coverage/"
    retention_days: 30

# ================================================================================
# RETRY CONFIGURATION
# ================================================================================

retry:
  max_attempts: 3
  backoff:
    type: "exponential"
    initial_ms: 1000
    max_ms: 30000
    multiplier: 2
    
  retryable_errors:
    - "ETIMEDOUT"
    - "ECONNRESET"
    - "ENOTFOUND"
    - "RATE_LIMIT_EXCEEDED"

# ================================================================================
# CLEANUP CONFIGURATION
# ================================================================================

cleanup:
  enabled: true
  
  on_success:
    - path: "output/tmp"
    - path: "*.tmp"
    
  on_failure:
    - path: "output/cargobit-payment-system"
    
  retention:
    max_runs: 10
    max_age_days: 30

# ================================================================================
# SECURITY CONFIGURATION
# ================================================================================

security:
  secrets:
    - name: "OPENAI_API_KEY"
      required: false
    - name: "ANTHROPIC_API_KEY"
      required: false
    - name: "REDIS_URL"
      required: false
      
  allowed_commands:
    - "node"
    - "npm"
    - "npx"
    - "git"
    - "tar"
    - "sha256sum"
    - "mkdir"
    - "cp"
    
  sandbox:
    enabled: true
    max_memory_mb: 1024
    max_cpu_percent: 80
    timeout_seconds: 600
