name: SBOM Generation

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      image-tag:
        description: 'Image tag to generate SBOM for'
        required: false
        type: string
        default: ''
    outputs:
      sbom-artifact:
        description: 'SBOM artifact name'
        value: sbom-${{ inputs.image-tag || github.sha }}

permissions:
  contents: read
  packages: read

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Check for Docker image or filesystem
        id: check-mode
        run: |
          if [ "${{ inputs.image-tag }}" != "" ]; then
            echo "mode=image" >> $GITHUB_OUTPUT
            echo "image-ref=ghcr.io/${{ github.repository_owner }}/governance-postcheck:${{ inputs.image-tag }}" >> $GITHUB_OUTPUT
          else
            echo "mode=filesystem" >> $GITHUB_OUTPUT
          fi
      
      - name: Log in to GitHub Container Registry
        if: steps.check-mode.outputs.mode == 'image'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate SBOM from filesystem
        if: steps.check-mode.outputs.mode == 'filesystem'
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom-spdx.json
          artifact-name: sbom-${{ github.sha }}
      
      - name: Generate SBOM from image
        if: steps.check-mode.outputs.mode == 'image'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.check-mode.outputs.image-ref }}
          format: spdx-json
          output-file: sbom-spdx.json
          artifact-name: sbom-${{ github.sha }}
      
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom-spdx.json
          retention-days: 30
          if-no-files-found: ignore
      
      - name: Upload SBOM to release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: sbom-spdx.json
