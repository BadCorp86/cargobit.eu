# GitHub Actions Workflow: Generate CargoBit Foundation
# Generated by SRE Agent v1.0.0
# 
# This workflow runs the multi-agent code generation system
# and validates the output before committing to the repository.

name: Generate CargoBit Foundation

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production
  
  # Trigger on specific branch pushes
  push:
    branches:
      - 'feature/generate-foundation'
    paths:
      - 'multi-agent/**'
      - 'pipeline/**'
  
  # Scheduled runs (weekly)
  schedule:
    - cron: '0 2 * * 0'  # Sunday at 2 AM UTC

env:
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.11'

jobs:
  # ===========================================================================
  # JOB 1: GENERATE
  # ===========================================================================
  generate:
    name: Generate Foundation Code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci
          npm install -g typescript ts-node
      
      - name: Run Multi-Agent System
        id: generate
        run: |
          echo "::group::Running Multi-Agent Orchestrator"
          node multi-agent/orchestrator.js 2>&1 | tee generation.log
          echo "::endgroup::"
          
          # Check if generation was successful
          if grep -q "GENERATION COMPLETE" generation.log; then
            echo "generation_status=success" >> $GITHUB_OUTPUT
          else
            echo "generation_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Upload generation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-foundation
          path: |
            multi-agent/output/
            generation.log
          retention-days: 7

  # ===========================================================================
  # JOB 2: VALIDATE
  # ===========================================================================
  validate:
    name: Validate Generated Code
    runs-on: ubuntu-latest
    needs: generate
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download generated artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-foundation
          path: multi-agent/output/
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install validation dependencies
        run: |
          npm install -g typescript ts-node eslint prettier
          npm install @typescript-eslint/parser @typescript-eslint/eslint-plugin
      
      - name: Validate structure
        id: validate_structure
        run: |
          echo "::group::Validating file structure"
          node pipeline/validate.js --structure
          echo "::endgroup::"
      
      - name: Validate TypeScript
        id: validate_typescript
        run: |
          echo "::group::Type checking generated TypeScript"
          node pipeline/validate.js --typescript
          echo "::endgroup::"
      
      - name: Validate SQL migrations
        id: validate_sql
        run: |
          echo "::group::Validating SQL migrations"
          node pipeline/validate.js --sql
          echo "::endgroup::"
      
      - name: Validate documentation
        id: validate_docs
        run: |
          echo "::group::Validating documentation"
          node pipeline/validate.js --documentation
          echo "::endgroup::"
      
      - name: Generate validation report
        run: |
          echo "## Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Structure | ${{ steps.validate_structure.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ${{ steps.validate_typescript.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SQL | ${{ steps.validate_sql.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ steps.validate_docs.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # JOB 3: TEST
  # ===========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cargobit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download generated artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-foundation
          path: multi-agent/output/
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install test dependencies
        run: |
          npm ci
          npm install -g vitest
      
      - name: Setup test database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/cargobit_test
        run: |
          # Apply migrations
          for file in multi-agent/output/migrations/*.sql; do
            echo "Applying: $file"
            psql $DATABASE_URL -f "$file"
          done
      
      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/cargobit_test
          REDIS_URL: redis://localhost:6379
        run: |
          echo "::group::Running unit tests"
          npm test -- --reporter=verbose
          echo "::endgroup::"
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            coverage/
            test-results/
          retention-days: 7

  # ===========================================================================
  # JOB 4: ASSEMBLE
  # ===========================================================================
  assemble:
    name: Assemble Artifacts
    runs-on: ubuntu-latest
    needs: [validate, test]
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download generated artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-foundation
          path: multi-agent/output/
      
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results/
        continue-on-error: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Assemble release package
        run: |
          echo "::group::Assembling release package"
          node pipeline/assemble.js
          echo "::endgroup::"
      
      - name: Generate manifest
        id: manifest
        run: |
          node pipeline/assemble.js --manifest > release-manifest.json
          echo "version=$(node -p "require('./release-manifest.json').version")" >> $GITHUB_OUTPUT
      
      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: |
            dist/
            release-manifest.json
          retention-days: 30

  # ===========================================================================
  # JOB 5: PUBLISH (Only on main branch)
  # ===========================================================================
  publish:
    name: Publish to Repository
    runs-on: ubuntu-latest
    needs: assemble
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Download release package
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: dist/
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit generated code
        run: |
          # Copy generated files to appropriate locations
          cp -r dist/prisma ./prisma
          cp -r dist/migrations ./migrations
          cp -r dist/src ./src
          cp -r dist/ops ./ops
          cp -r dist/docs ./docs
          cp -r dist/tests ./tests
          
          # Stage changes
          git add prisma/ migrations/ src/ ops/ docs/ tests/
          
          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: regenerate foundation code [skip ci]"
            git push
          fi
      
      - name: Create release tag
        run: |
          VERSION=$(node -p "require('./dist/release-manifest.json').version")
          git tag -a "v${VERSION}" -m "Foundation code generation ${VERSION}"
          git push origin "v${VERSION}"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.assemble.outputs.version }}
          name: CargoBit Foundation v${{ needs.assemble.outputs.version }}
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # JOB 6: NOTIFY
  # ===========================================================================
  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [generate, validate, test, assemble]
    if: always()
    
    steps:
      - name: Determine overall status
        id: status
        run: |
          if [[ "${{ needs.generate.result }}" == "success" && \
                "${{ needs.validate.result }}" == "success" && \
                "${{ needs.test.result }}" == "success" && \
                "${{ needs.assemble.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi
      
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "text": "CargoBit Foundation Generation ${{ steps.status.outputs.status == 'success' && '✅ Completed' || '❌ Failed' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*CargoBit Foundation Generation*\n\nStatus: ${{ steps.status.outputs.status == 'success' && '✅ Success' || '❌ Failed' }}\nBranch: ${{ github.ref_name }}\nTriggered by: ${{ github.actor }}"
                  }
                }
              ]
            }' \
            $SLACK_WEBHOOK_URL
