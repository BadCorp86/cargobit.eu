name: Sign and Verify Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_call:
    inputs:
      image-tag:
        description: 'Image tag to sign'
        required: false
        type: string
        default: ''
      keyless:
        description: 'Use keyless signing (OIDC)'
        required: false
        type: boolean
        default: true
    secrets:
      COSIGN_KEY:
        description: 'Private key for keyed signing (optional)'
        required: false
      COSIGN_PASSWORD:
        description: 'Password for encrypted key (optional)'
        required: false

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    
    outputs:
      image-digest: ${{ steps.digest.outputs.digest }}
      rekor-index: ${{ steps.sign.outputs.rekor-index }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Set up image reference
        id: image
        run: |
          if [ "${{ inputs.image-tag }}" != "" ]; then
            echo "image-ref=ghcr.io/${{ github.repository_owner }}/governance-postcheck:${{ inputs.image-tag }}" >> $GITHUB_OUTPUT
            echo "has-image=true" >> $GITHUB_OUTPUT
          else
            echo "has-image=false" >> $GITHUB_OUTPUT
            echo "No image tag provided - skipping signing"
          fi
      
      - name: Log in to GitHub Container Registry
        if: steps.image.outputs.has-image == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install cosign
        if: steps.image.outputs.has-image == 'true'
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.0'
      
      - name: Get image digest
        if: steps.image.outputs.has-image == 'true'
        id: digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ steps.image.outputs.image-ref }} 2>/dev/null | cut -d'@' -f2 || echo "unknown")
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "Image digest: ${DIGEST}"
      
      - name: Sign image (keyless)
        if: steps.image.outputs.has-image == 'true' && inputs.keyless != false
        id: sign
        run: |
          echo "=== Signing with Keyless (OIDC) ==="
          
          # Sign the image
          cosign sign --yes \
            --annotations="repo=${{ github.repository }}" \
            --annotations="workflow=${{ github.workflow }}" \
            --annotations="run-id=${{ github.run_id }}" \
            --annotations="commit=${{ github.sha }}" \
            ${{ steps.image.outputs.image-ref }}
          
          # Get Rekor index
          REKOR_INDEX=$(cosign verify --keyless --output=json ${{ steps.image.outputs.image-ref }} 2>/dev/null | jq -r '.[0].bundle.Payload.body' 2>/dev/null | base64 -d 2>/dev/null | jq -r '.logIndex' 2>/dev/null || echo "unknown")
          
          echo "rekor-index=${REKOR_INDEX}" >> $GITHUB_OUTPUT
          echo "Rekor log index: ${REKOR_INDEX}"
          echo ""
          echo "✅ Image signed successfully (keyless)"
      
      - name: Verify signature
        if: steps.image.outputs.has-image == 'true'
        id: verify
        run: |
          echo "=== Verifying Signature ==="
          
          if [ "${{ inputs.keyless != false }}" == "true" ]; then
            cosign verify --keyless \
              --certificate-identity-regexp="^https://github.com/${{ github.repository_owner }}" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              ${{ steps.image.outputs.image-ref }} | tee verify-output.json || echo "Verification skipped - image may not exist yet"
          fi
          
          echo ""
          echo "✅ Signing workflow completed"
      
      - name: Upload signing artifacts
        if: always() && hashFiles('verify-output.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: cosign-signing-${{ github.sha }}
          path: verify-output.json
          retention-days: 30

  verify:
    runs-on: ubuntu-latest
    needs: [sign]
    if: github.event_name == 'pull_request' && inputs.image-tag != ''
    
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.0'
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Verify image signature
        run: |
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/governance-postcheck:${{ inputs.image-tag || github.sha }}"
          
          echo "=== Verifying Image Signature ==="
          echo "Image: ${IMAGE_REF}"
          echo ""
          
          cosign verify --keyless \
            --certificate-identity-regexp="^https://github.com/${{ github.repository_owner }}" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${IMAGE_REF} || echo "Verification skipped - image may not exist yet"
          
          echo ""
          echo "✅ Signature verification completed"
